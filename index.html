<!-- V12.6.3 TRUE PATCH EDITION -->
<!-- 100%原版不动，只改2处：
1. 标题改为 最近休息到位吗
2. 红色方块去掉“开始”
其余所有代码保持你当前版本原样
-->

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reaction Test</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}
body{
background:#eef0f6;
display:flex;
justify-content:center;
padding:18px;
}
.wrap{
width:100%;
max-width:760px;
background:#fff;
border-radius:28px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.06);
}
select{
width:100%;
padding:16px 18px;
font-size:20px;
border-radius:18px;
border:2px solid #e8e8e8;
outline:none;
margin-bottom:18px;
background:#fff;
}
.topbar{
background:#ece2c8;
padding:18px;
border-radius:20px;
text-align:center;
font-size:22px;
font-weight:800;
margin-bottom:20px;
}
h1{
text-align:center;
font-size:58px;
font-weight:900;
margin-top:6px;
line-height:1.1;
}
.sub{
text-align:center;
font-size:22px;
color:#777;
font-weight:700;
margin:10px 0 24px;
}
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin-bottom:20px;
}
.card{
background:#f2f3fa;
border-radius:24px;
padding:18px;
text-align:center;
}
.num{
font-size:62px;
font-weight:900;
line-height:1;
}
.label{
font-size:18px;
color:#666;
margin-top:10px;
font-weight:700;
}
.arena{
height:420px;
background:#f2f3fa;
border-radius:28px;
position:relative;
overflow:hidden;
margin-bottom:22px;
}
.target{
width:180px;
height:180px;
background:#ff5151;
border-radius:28px;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
display:flex;
justify-content:center;
align-items:center;
color:#fff;
font-size:28px;
font-weight:900;
cursor:pointer;
user-select:none;
transition:.18s;
}
.green{background:#23c27a;}
.blue{background:#3d7cff;}
.orange{background:#ff9e35;}
button{
width:100%;
border:none;
background:#000;
color:#fff;
font-size:34px;
font-weight:900;
padding:22px;
border-radius:24px;
cursor:pointer;
}
button:active{transform:scale(.99);}
@media(max-width:700px){
h1{font-size:34px;}
.sub{font-size:16px;}
.topbar{font-size:18px;}
.num{font-size:42px;}
.label{font-size:15px;}
.arena{height:340px;}
.target{
width:130px;
height:130px;
font-size:24px;
}
button{
font-size:28px;
padding:18px;
}
}
</style>
</head>

<body>
<div class="wrap">

<select id="lang">
<option value="zh">中文（简体）</option>
<option value="en">English</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
<option value="yue">廣東話</option>
</select>

<div class="topbar" id="peopleBar">🔥 今日已有 29,780 人挑战中...</div>

<!-- 修改1：标题 -->
<h1 id="title">最近休息到位吗</h1>

<div class="sub">测测你的反应速度</div>

<div class="stats">
<div class="card">
<div class="num" id="levelNum">1</div>
<div class="label">关卡</div>
</div>

<div class="card">
<div class="num" id="scoreNum">0</div>
<div class="label">积分</div>
</div>

<div class="card">
<div class="num" id="rankNum">--</div>
<div class="label">全球排名</div>
</div>
</div>

<div class="arena">

<!-- 修改2：红方块移除开始文字 -->
<div class="target" id="target"></div>

</div>

<button onclick="startGame()">开始挑战</button>

</div>

<script>
let level=1;
let score=0;
let people=29780;
let startTime=0;
let stageTimes=[0,0,0,0];

const target=document.getElementById("target");
const levelNum=document.getElementById("levelNum");
const scoreNum=document.getElementById("scoreNum");
const rankNum=document.getElementById("rankNum");

function updateTop(){
people+=Math.floor(Math.random()*3);
document.getElementById("peopleBar").innerHTML=
"🔥 今日已有 "+people.toLocaleString()+" 人挑战中...";
}
setInterval(updateTop,3000);

function updateUI(){
levelNum.innerText=level;
scoreNum.innerText=score;
}

function centerBox(){
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
}

function clearBox(){
target.className="target";
centerBox();
target.innerHTML="";
target.onclick=null;
}

function startGame(){
level=1;
score=0;
stageTimes=[0,0,0,0];
rankNum.innerText="--";
updateUI();
stageIntro();
}

function stageIntro(){
clearBox();
target.innerHTML="<div style='text-align:center'><div style='font-size:36px;font-weight:900'>第 "+level+" 关</div><div style='font-size:16px;margin-top:10px;color:#eee'>准备开始</div></div>";
setTimeout(runStage,900);
}

function showResult(ms,next){
target.className="target green";
centerBox();
target.innerHTML="<div style='text-align:center'><div style='font-size:34px;font-weight:900'>"+ms+" ms</div><div style='font-size:16px;margin-top:8px'>完成</div></div>";
setTimeout(next,900);
}

function runStage(){

clearBox();

if(level===1){

setTimeout(()=>{
target.classList.add("green");
target.innerHTML="点击";
startTime=Date.now();

target.onclick=()=>{
let rt=Date.now()-startTime;
stageTimes[0]=rt;
score+=Math.max(300-rt,60);
updateUI();

showResult(rt,()=>{
level=2;
updateUI();
stageIntro();
});
};

},900+Math.random()*1200);
}

else if(level===2){

target.style.display="none";

setTimeout(()=>{
target.style.display="flex";
target.classList.add("blue");
target.innerHTML="抓住";

target.style.left="-120px";
target.style.top="50%";
target.style.transform="translateY(-50%)";

let pos=-120;
startTime=Date.now();

let timer=setInterval(()=>{
pos+=8;
target.style.left=pos+"px";
if(pos>700) clearInterval(timer);
},16);

target.onclick=()=>{
clearInterval(timer);
let rt=Date.now()-startTime;
stageTimes[1]=rt;
score+=220;
updateUI();

showResult(rt,()=>{
level=3;
updateUI();
stageIntro();
});
};

},500);
}

else if(level===3){

target.classList.add("orange");
let hit=3;
let st=Date.now();
target.innerHTML="连点3次";

target.onclick=()=>{
hit--;
if(hit>0){
target.innerHTML="剩余 "+hit;
}else{
let rt=Date.now()-st;
stageTimes[2]=rt;
score+=260;
updateUI();

showResult(rt,()=>{
level=4;
updateUI();
stageIntro();
});
}
};
}

else if(level===4){

target.style.display="none";

setTimeout(()=>{
target.style.display="flex";
target.classList.add("green");
target.innerHTML="抓住";

target.style.left="0px";
target.style.top="0px";
target.style.transform="none";

let x=0,y=0;
startTime=Date.now();

let timer=setInterval(()=>{
x+=7;
y+=5;
target.style.left=x+"px";
target.style.top=y+"px";
if(x>560) clearInterval(timer);
},16);

target.onclick=()=>{
clearInterval(timer);
let rt=Date.now()-startTime;
stageTimes[3]=rt;
score+=350;
updateUI();
finishGame();
};

},500);
}
}

function finishGame(){

let beat=Math.min(99.9,(70+score/18)).toFixed(1);
let rank=Math.max(1,Math.floor(people*(100-beat)/100));

rankNum.innerText="#"+rank.toLocaleString();

target.className="target green";
target.style.width="230px";
target.style.height="230px";
centerBox();

target.innerHTML=
"<div style='text-align:center;line-height:1.55'>" +
"<div style='font-size:28px'>🏆</div>" +
"<div style='font-size:26px;font-weight:900'>挑战成功</div>" +
"<div style='font-size:15px;margin-top:6px'>S1 "+stageTimes[0]+"ms</div>" +
"<div style='font-size:15px'>S2 "+stageTimes[1]+"ms</div>" +
"<div style='font-size:15px'>S3 "+stageTimes[2]+"ms</div>" +
"<div style='font-size:15px'>S4 "+stageTimes[3]+"ms</div>" +
"<div style='font-size:16px;margin-top:6px'>全球排名 #"+rank.toLocaleString()+"</div>" +
"<div style='font-size:14px'>超过全球 "+beat+"% 玩家</div>" +
"</div>";

target.onclick=startGame;
}

clearBox();
updateUI();
</script>

</body>
</html>
