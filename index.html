<!-- V12.6.2 PATCH ONLY
Base = V12.6.1
ONLY CHANGED:
1. Results of each stage shown inside arena
2. Show stage index before each stage starts
3. Final result shown inside arena
Everything else preserved
-->

<script>
/* ========= PATCH REPLACE ONLY JS GAME FLOW ========= */

function startGame(){
level=1;
score=0;
stageTimes=[0,0,0,0];
rankNum.innerText="--";
result.innerHTML="";
updateUI();
showStageIntro();
}

function showStageIntro(){
resetBox();

target.className="target";
target.style.display="flex";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

target.innerHTML=`
<div style="text-align:center;">
<div style="font-size:36px;font-weight:900;">${currentLang==="en"?"Stage":"第"} ${level}</div>
<div style="font-size:18px;margin-top:10px;color:#666;">
${currentLang==="en"?"Ready...":"准备开始"}
</div>
</div>
`;

setTimeout(()=>{
runLevel();
},1000);
}

function showStageResult(ms,nextFn){
target.className="target green";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

target.innerHTML=`
<div style="text-align:center;">
<div style="font-size:34px;font-weight:900;">${ms} ms</div>
<div style="font-size:16px;margin-top:8px;">${currentLang==="en"?"Good!":"完成"}</div>
</div>
`;

setTimeout(nextFn,900);
}

function runLevel(){
resetBox();

/* Stage 1 */
if(level===1){
target.innerText=t("wait");

setTimeout(()=>{
target.classList.add("green");
target.innerText=t("click");
startTime=Date.now();

target.onclick=()=>{
let rt=Date.now()-startTime;
stageTimes[0]=rt;
score+=Math.max(320-rt,60);
updateUI();

showStageResult(rt,()=>{
level=2;
updateUI();
showStageIntro();
});
};
},1000+Math.random()*1400);
}

/* Stage 2 patched */
else if(level===2){
target.style.display="none";

setTimeout(()=>{
target.style.display="flex";
target.classList.add("blue");
target.innerText=t("grab");

runSlideStage(false,()=>{
let rt=Date.now()-startTime;
stageTimes[1]=rt;
score+=220;
updateUI();

showStageResult(rt,()=>{
level=3;
updateUI();
showStageIntro();
});
});

},500);
}

/* Stage 3 */
else if(level===3){
target.classList.add("orange");
let hit=3;
let st=Date.now();
target.innerText=t("tap3");

target.onclick=()=>{
hit--;

if(hit>0){
target.innerText=t("againTap")+hit;
}else{
let rt=Date.now()-st;
stageTimes[2]=rt;
score+=260;
updateUI();

showStageResult(rt,()=>{
level=4;
updateUI();
showStageIntro();
});
}
};
}

/* Stage 4 */
else if(level===4){
target.style.display="none";

setTimeout(()=>{
target.style.display="flex";
target.classList.add("green");
target.innerText=t("grab");

runSlideStage(true,()=>{
let rt=Date.now()-startTime;
stageTimes[3]=rt;
score+=350;
updateUI();

finishGame();
});

},500);
}
}

function finishGame(){
clearInterval(timer);

let beat=Math.min(99.9,(70+score/18)).toFixed(1);
let rank=Math.max(1,Math.floor(people*(100-beat)/100));

rankNum.innerText="#"+rank.toLocaleString();

target.className="target green";
target.style.width="220px";
target.style.height="220px";
target.style.borderRadius="28px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

target.innerHTML=`
<div style="text-align:center;line-height:1.5;padding:8px;">
<div style="font-size:28px;font-weight:900;">🏆</div>
<div style="font-size:26px;font-weight:900;">${currentLang==="en"?"Success":"挑战成功"}</div>
<div style="font-size:15px;margin-top:8px;">S1 ${stageTimes[0]}ms</div>
<div style="font-size:15px;">S2 ${stageTimes[1]}ms</div>
<div style="font-size:15px;">S3 ${stageTimes[2]}ms</div>
<div style="font-size:15px;">S4 ${stageTimes[3]}ms</div>
<div style="font-size:16px;margin-top:6px;">#${rank.toLocaleString()}</div>
<div style="font-size:14px;">TOP ${beat}%</div>
</div>
`;

target.onclick=startGame;
}

/* ========= END PATCH ========= */
</script>
