<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Reaction Test V12.6.4 Full Fit Final</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#dfe0e8;
  overflow:hidden;
}

/* ===== ONLY SAFE FULL FIT FIX ===== */
body{
  display:flex;
  justify-content:center;
  align-items:flex-start;
}

.app{
  width:100%;
  max-width:760px;
  height:100vh;
  background:#f5f5f7;
  overflow:hidden;
  padding:14px;

  display:flex;
  flex-direction:column;
}

/* language */
.top-select{
  width:100%;
  height:52px;
  border-radius:18px;
  border:2px solid #e6e6e6;
  padding:0 18px;
  font-size:18px;
  background:#fff;
  margin-bottom:12px;
  flex-shrink:0;
}

/* banner */
.banner{
  width:100%;
  height:64px;
  border-radius:22px;
  background:#e7ddbf;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  font-weight:800;
  margin-bottom:14px;
  flex-shrink:0;
}

/* title */
h1{
  font-size:52px;
  text-align:center;
  font-weight:900;
  line-height:1.05;
  flex-shrink:0;
}

.sub{
  text-align:center;
  color:#888;
  font-size:22px;
  margin-top:10px;
  margin-bottom:16px;
  font-weight:700;
  flex-shrink:0;
}

/* stats */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin-bottom:14px;
  flex-shrink:0;
}

.card{
  background:#ececf4;
  border-radius:24px;
  height:132px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.big{
  font-size:62px;
  font-weight:900;
  line-height:1;
}

.small{
  margin-top:8px;
  font-size:22px;
  color:#666;
  font-weight:700;
}

/* arena */
.arena{
  width:100%;
  flex:1;
  min-height:220px;
  border-radius:34px;
  background:#ececf4;
  position:relative;
  overflow:hidden;
  margin-bottom:14px;
}

/* target */
.target{
  width:116px;
  height:116px;
  border-radius:26px;
  background:#ff5252;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  transition:all .18s ease;
}

.target.green{ background:#25c27a; }
.target.blue{ background:#4d82ff; }
.target.orange{ background:#ff9d32; }

/* button */
.main-btn{
  width:100%;
  height:86px;
  border:none;
  border-radius:28px;
  background:#000;
  color:#fff;
  font-size:34px;
  font-weight:900;
  cursor:pointer;
  flex-shrink:0;
}

/* smaller screens */
@media (max-width:700px){

  .app{
    padding:10px;
  }

  .top-select{
    height:46px;
    font-size:16px;
    margin-bottom:10px;
  }

  .banner{
    height:58px;
    font-size:16px;
    margin-bottom:10px;
  }

  h1{
    font-size:34px;
  }

  .sub{
    font-size:16px;
    margin-top:6px;
    margin-bottom:10px;
  }

  .stats{
    gap:8px;
    margin-bottom:10px;
  }

  .card{
    height:100px;
    border-radius:20px;
  }

  .big{
    font-size:38px;
  }

  .small{
    font-size:14px;
    margin-top:4px;
  }

  .arena{
    min-height:220px;
    border-radius:24px;
    margin-bottom:10px;
  }

  .target{
    width:96px;
    height:96px;
    border-radius:22px;
  }

  .main-btn{
    height:68px;
    font-size:22px;
    border-radius:22px;
  }
}

</style>
</head>

<body>

<div class="app">

<select class="top-select">
  <option>中文（简体）</option>
</select>

<div class="banner">🔥 Today 29,783 players are challenging...</div>

<h1>Recently Rested Enough?</h1>
<div class="sub">Test your reaction speed</div>

<div class="stats">
  <div class="card">
    <div class="big">1</div>
    <div class="small">Stage</div>
  </div>

  <div class="card">
    <div class="big">0</div>
    <div class="small">Score</div>
  </div>

  <div class="card">
    <div class="big">--</div>
    <div class="small">Global Rank</div>
  </div>
</div>

<div class="arena">
  <div class="target"></div>
</div>

<button class="main-btn">Start Challenge</button>

</div>

</body>
</html>
