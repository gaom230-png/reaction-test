<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最近你有好好休息吗？</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(180deg,#eef1fb,#f8f9ff);
color:#111;
}

.wrapper{
max-width:480px;
margin:auto;
padding:10px;
}

.card{
background:#fff;
border-radius:22px;
padding:14px;
box-shadow:0 8px 24px rgba(0,0,0,.06);
overflow:hidden;
}

.lang{
width:100%;
padding:10px 12px;
font-size:15px;
border:2px solid #ddd;
border-radius:14px;
margin-bottom:12px;
background:#fff;
}

.liveWrap{
background:#f7edd4;
border-radius:16px;
padding:10px 0;
overflow:hidden;
margin-bottom:12px;
}

.liveTrack{
white-space:nowrap;
display:inline-block;
font-size:15px;
font-weight:800;
animation:marquee 18s linear infinite;
padding-left:100%;
}

@keyframes marquee{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

h1{
font-size:30px;
line-height:1.2;
font-weight:900;
text-align:center;
margin-bottom:6px;
}

.sub{
text-align:center;
font-size:16px;
color:#777;
font-weight:700;
margin-bottom:12px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-bottom:12px;
}

.stat{
background:#f2f3fa;
border-radius:16px;
padding:10px 6px;
text-align:center;
}

.num{
font-size:30px;
font-weight:900;
}

.label{
font-size:13px;
color:#666;
margin-top:4px;
font-weight:700;
}

.gamebox{
height:250px;
background:#f2f3fa;
border-radius:18px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:12px;
}

.target{
width:130px;
height:130px;
border-radius:20px;
background:#ff4d4d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
font-weight:900;
cursor:pointer;
user-select:none;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
}

.green{background:#17c97a;}
.blue{background:#247cff;}

.small{
width:88px;
height:88px;
border-radius:16px;
font-size:18px;
transform:none;
}

.result{
text-align:center;
margin-bottom:10px;
}

.result h2{
font-size:24px;
margin-bottom:4px;
}

.result p{
font-size:15px;
color:#666;
margin:3px 0;
}

.btn{
width:100%;
border:none;
border-radius:16px;
padding:13px;
font-size:20px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

.black{background:#000;color:#fff;}
.gray{background:#eef0f5;color:#111;}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">

<select class="lang">
<option>中文（简体）</option>
<option>English</option>
<option>廣東話</option>
<option>日本語</option>
<option>한국어</option>
</select>

<div class="liveWrap">
<div class="liveTrack" id="liveTrack">
🔥 今日已有 28,642 人挑战 ｜ 上海用户刚通关第3关 ｜ 海外用户获得588分 ｜ 东京用户进入前10% ｜ 深圳用户挑战成功
</div>
</div>

<h1>最近你有好好休息吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="stats">
<div class="stat"><div class="num" id="level">1</div><div class="label">关卡</div></div>
<div class="stat"><div class="num" id="score">0</div><div class="label">积分</div></div>
<div class="stat"><div class="num" id="rank">--</div><div class="label">全球排名</div></div>
</div>

<div class="gamebox" id="gamebox">
<div class="target" id="target">开始</div>
</div>

<div class="result" id="result">
<h2>准备好了吗？</h2>
<p>完成3关看看你的实力</p>
</div>

<button class="btn black" onclick="restartGame()">开始挑战</button>
<button class="btn gray">发给朋友挑战</button>

</div>
</div>

<script>
let stage=0;
let score=0;
let ready=false;
let startTime=0;
let moveInterval=null;

const target=document.getElementById("target");
const gamebox=document.getElementById("gamebox");

/* top live bar */
function updateLive(){
let n=28642+Math.floor(Math.random()*900);
document.getElementById("liveTrack").innerHTML=
"🔥 今日已有 "+n.toLocaleString()+" 人挑战 ｜ 上海用户刚通关第3关 ｜ 海外用户获得588分 ｜ 东京用户进入前10% ｜ 深圳用户挑战成功";
}
setInterval(updateLive,4000);

/* reset */
function restartGame(){
clearInterval(moveInterval);

stage=1;
score=0;
ready=false;

document.getElementById("score").innerText="0";
document.getElementById("rank").innerText="--";
document.getElementById("level").innerText="1";

document.getElementById("result").innerHTML=
"<h2>准备好了吗？</h2><p>等待变绿后立即点击</p>";

target.className="target";
target.innerText="等待...";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

setTimeout(()=>{
ready=true;
target.className="target green";
target.innerText="点击!";
startTime=Date.now();
},1000+Math.random()*1500);
}

/* click handler */
target.onclick=function(){

/* Level 1 */
if(stage===1 && ready){
let rt=Date.now()-startTime;
score=Math.max(100,420-rt);

document.getElementById("score").innerText=score;
document.getElementById("level").innerText="2";
document.getElementById("result").innerHTML=
"<h2>第一关完成</h2><p>"+rt+" ms</p>";

stage=2;
level2();
return;
}

/* Level 2 */
if(stage===2){
clearInterval(moveInterval);

score+=180;
document.getElementById("score").innerText=score;
document.getElementById("level").innerText="3";
document.getElementById("result").innerHTML=
"<h2>第二关完成</h2><p>继续冲刺！</p>";

stage=3;
level3();
return;
}

/* Level 3 */
if(stage===3){
tapCount++;
target.innerText="连点"+(5-tapCount)+"次";

if(tapCount>=5){
finishGame();
}
return;
}

/* Replay */
if(stage===4){
restartGame();
}
};

function level2(){
target.className="target small blue";
target.innerText="抓我";

moveInterval=setInterval(()=>{
let maxX=gamebox.clientWidth-88;
let maxY=gamebox.clientHeight-88;

target.style.left=Math.random()*maxX+"px";
target.style.top=Math.random()*maxY+"px";
target.style.transform="none";
},450);
}

let tapCount=0;

function level3(){
clearInterval(moveInterval);

tapCount=0;
target.className="target green";
target.style.width="120px";
target.style.height="120px";
target.style.borderRadius="20px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
target.innerText="连点5次";
}

function finishGame(){
stage=4;

score+=220;
document.getElementById("score").innerText=score;

let rank="前50%";
if(score>700) rank="前1%";
else if(score>620) rank="前5%";
else if(score>520) rank="前10%";
else if(score>430) rank="前25%";

document.getElementById("rank").innerText=rank;

document.getElementById("result").innerHTML=
"<h2>🏆 挑战成功</h2><p>总分："+score+
"</p><p>你已进入全球"+rank+"</p>";

target.className="target";
target.innerText="再来一次";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
}
</script>

</body>
</html>
