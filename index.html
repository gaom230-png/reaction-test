<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最近你有好好休息吗？</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(180deg,#eef1fb,#f8f9ff);
color:#111;
}

.wrapper{
max-width:460px;
margin:auto;
padding:10px;
}

.card{
background:#fff;
border-radius:22px;
padding:14px;
box-shadow:0 10px 28px rgba(0,0,0,.06);
overflow:hidden;
}

/* language */
.lang{
width:100%;
padding:10px 12px;
font-size:15px;
border:2px solid #e3e3e3;
border-radius:14px;
margin-bottom:12px;
background:#fff;
}

/* top live bar */
.liveWrap{
background:#f8efd8;
border-radius:16px;
padding:14px;
margin-bottom:12px;
text-align:center;
}

.liveStatic{
font-size:16px;
font-weight:900;
color:#111;
}

#liveNum{
font-size:18px;
font-weight:900;
animation:pulse 1.6s infinite;
display:inline-block;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* title */
h1{
font-size:28px;
line-height:1.2;
font-weight:900;
text-align:center;
margin-bottom:4px;
}

.sub{
text-align:center;
font-size:15px;
color:#777;
font-weight:700;
margin-bottom:12px;
}

/* stats */
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-bottom:12px;
}

.stat{
background:#f4f5fb;
border-radius:16px;
padding:10px 6px;
text-align:center;
}

.num{
font-size:28px;
font-weight:900;
}

.label{
font-size:12px;
color:#666;
margin-top:4px;
font-weight:700;
}

/* game box */
.gamebox{
height:250px;
background:#f3f4fa;
border-radius:18px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:12px;
}

.target{
width:122px;
height:122px;
border-radius:18px;
background:#ff4d4d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
cursor:pointer;
user-select:none;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
transition:.12s;
}

.green{background:#18c97a;}
.blue{background:#247cff;}
.purple{background:#7a4dff;}

.small{
width:84px;
height:84px;
font-size:18px;
border-radius:14px;
transform:none;
}

.slideRect{
width:84px;
height:58px;
font-size:18px;
border-radius:14px;
transform:none;
}

/* result */
.result{
text-align:center;
margin-bottom:10px;
min-height:58px;
}

.result h2{
font-size:22px;
margin-bottom:4px;
}

.result p{
font-size:14px;
color:#666;
margin:2px 0;
}

/* buttons */
.btn{
width:100%;
border:none;
border-radius:16px;
padding:13px;
font-size:18px;
font-weight:900;
cursor:pointer;
margin-top:8px;
}

.black{
background:#000;
color:#fff;
}

.gray{
background:#eef0f5;
color:#111;
}

@media(max-height:740px){
.gamebox{height:220px;}
h1{font-size:25px;}
}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">

<select class="lang">
<option>中文（简体）</option>
<option>English</option>
<option>廣東話</option>
<option>日本語</option>
<option>한국어</option>
</select>

<div class="liveWrap">
<div class="liveStatic">
🔥 今日已有 <span id="liveNum">29,580</span> 人挑战中...
</div>
</div>

<h1>最近你有好好休息吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="stats">
<div class="stat">
<div class="num" id="level">1</div>
<div class="label">关卡</div>
</div>

<div class="stat">
<div class="num" id="score">0</div>
<div class="label">积分</div>
</div>

<div class="stat">
<div class="num" id="rank">--</div>
<div class="label">全球排名</div>
</div>
</div>

<div class="gamebox" id="gamebox">
<div class="target" id="target">开始</div>
</div>

<div class="result" id="result">
<h2>准备好了吗？</h2>
<p>完成4关看看你的实力</p>
</div>

<button class="btn black" onclick="restartGame()">开始挑战</button>
<button class="btn gray">发给朋友挑战</button>

</div>
</div>

<script>
let stage=0;
let score=0;
let ready=false;
let startTime=0;
let moveTimer=null;
let tapCount=0;
let slideTimer=null;

const target=document.getElementById("target");
const gamebox=document.getElementById("gamebox");
const level=document.getElementById("level");
const scoreEl=document.getElementById("score");
const rank=document.getElementById("rank");
const result=document.getElementById("result");

/* live count */
setInterval(()=>{
let n=28642+Math.floor(Math.random()*3000);
document.getElementById("liveNum").innerText=n.toLocaleString();
},3000);

/* start */
function restartGame(){
clearInterval(moveTimer);
clearInterval(slideTimer);

stage=1;
score=0;
ready=false;
tapCount=0;

level.innerText="1";
scoreEl.innerText="0";
rank.innerText="--";

result.innerHTML="<h2>准备好了吗？</h2><p>等待变绿后立即点击</p>";

target.className="target";
target.innerText="等待...";
target.style.width="122px";
target.style.height="122px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

setTimeout(()=>{
ready=true;
target.className="target green";
target.innerText="点击!";
startTime=Date.now();
},900+Math.random()*1400);
}

/* click logic */
target.onclick=function(){

if(stage===1 && ready){
let rt=Date.now()-startTime;
score=Math.max(100,420-rt);
scoreEl.innerText=score;
level.innerText="2";

result.innerHTML="<h2>第一关完成</h2><p>"+rt+" ms</p>";

stage=2;
setTimeout(level2,420);
return;
}

if(stage===2){
clearInterval(moveTimer);

score+=180;
scoreEl.innerText=score;
level.innerText="3";

result.innerHTML="<h2>第二关完成</h2><p>继续冲刺！</p>";

stage=3;
setTimeout(level3,320);
return;
}

if(stage===3){
tapCount++;
target.innerText="连点"+(5-tapCount)+"次";

if(tapCount>=5){
score+=220;
scoreEl.innerText=score;
level.innerText="4";

result.innerHTML="<h2>第三关完成</h2><p>终极挑战来了！</p>";

stage=4;
setTimeout(level4,400);
}
return;
}

if(stage===4){
finishGame();
return;
}

if(stage===5){
restartGame();
}
};

/* level2 moving square */
function level2(){
target.className="target small blue";
target.innerText="抓我";

moveTimer=setInterval(()=>{
let maxX=gamebox.clientWidth-84;
let maxY=gamebox.clientHeight-84;

target.style.left=Math.random()*maxX+"px";
target.style.top=Math.random()*maxY+"px";
target.style.transform="none";
},420);
}

/* level3 tap spam */
function level3(){
tapCount=0;

target.className="target green";
target.style.width="118px";
target.style.height="118px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
target.innerText="连点5次";
}

/* level4 sliding rectangle */
function level4(){

target.className="target purple slideRect";
target.innerText="点我";

let w=84;
let h=58;
let maxX=gamebox.clientWidth-w;
let maxY=gamebox.clientHeight-h;

let paths=[
{sx:0,sy:0,ex:maxX,ey:0},
{sx:0,sy:0,ex:0,ey:maxY},
{sx:0,sy:0,ex:maxX,ey:maxY},
{sx:maxX,sy:0,ex:0,ey:maxY},
{sx:0,sy:maxY,ex:maxX,ey:0},
{sx:maxX,sy:maxY,ex:0,ey:0}
];

let p=paths[Math.floor(Math.random()*paths.length)];

target.style.left=p.sx+"px";
target.style.top=p.sy+"px";
target.style.transform="none";

let step=0;
let total=28;

slideTimer=setInterval(()=>{
step++;

let t=step/total;

let x=p.sx+(p.ex-p.sx)*t;
let y=p.sy+(p.ey-p.sy)*t;

target.style.left=x+"px";
target.style.top=y+"px";

if(step>=total){
clearInterval(slideTimer);
level4();
}
},25);
}

/* finish */
function finishGame(){
clearInterval(slideTimer);

stage=5;
score+=320;
scoreEl.innerText=score;

let rankText="前50%";
if(score>950) rankText="前1%";
else if(score>820) rankText="前5%";
else if(score>700) rankText="前10%";
else if(score>580) rankText="前25%";

rank.innerText=rankText;

result.innerHTML=
"<h2>🏆 挑战成功</h2><p>总分："+score+
"</p><p>你已进入全球"+rankText+"</p>";

target.className="target";
target.innerText="再来一次";
target.style.width="122px";
target.style.height="122px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
}
</script>

</body>
</html>
