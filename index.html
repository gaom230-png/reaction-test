<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reaction Challenge</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#eef1ff,#f6f7ff);
display:flex;
justify-content:center;
padding:12px;
}

.wrap{
width:100%;
max-width:520px;
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

select{
width:100%;
padding:14px;
font-size:18px;
border-radius:16px;
border:2px solid #ddd;
margin-bottom:18px;
}

h1{
text-align:center;
font-size:clamp(26px,6vw,46px);
margin-bottom:8px;
font-weight:900;
line-height:1.15;
}

.sub{
text-align:center;
font-size:clamp(15px,3vw,24px);
color:#777;
margin-bottom:18px;
font-weight:700;
}

.banner{
padding:14px;
border-radius:18px;
text-align:center;
font-size:clamp(16px,3.5vw,24px);
font-weight:900;
margin-bottom:12px;
}

.b1{background:#f7edd4;}
.b2{background:#dfe9f8;}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.card{
background:#f2f3fb;
padding:16px;
border-radius:20px;
text-align:center;
}

.num{
font-size:clamp(24px,5vw,42px);
font-weight:900;
}

.label{
margin-top:6px;
font-size:clamp(14px,2.5vw,20px);
color:#666;
font-weight:800;
}

.game{
height:min(62vw,420px);
min-height:320px;
background:#f3f4fb;
border-radius:26px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:18px;
}

.btn{
background:#ff4d57;
color:#fff;
border:none;
padding:18px 28px;
font-size:clamp(20px,4vw,32px);
font-weight:900;
border-radius:20px;
cursor:pointer;
}

.green{background:#16c47f;}
.blue{background:#247cff;}

.black{
background:#000;
color:#fff;
padding:18px;
border:none;
border-radius:18px;
font-size:24px;
font-weight:900;
width:100%;
cursor:pointer;
margin-top:10px;
}

.result{
text-align:center;
font-size:clamp(18px,4vw,32px);
font-weight:900;
line-height:1.5;
margin-bottom:10px;
}

.moveBox{
width:90px;
height:90px;
background:#247cff;
position:absolute;
border-radius:18px;
cursor:pointer;
}

.smallDot{
width:58px;
height:58px;
background:#16c47f;
border-radius:50%;
position:absolute;
cursor:pointer;
}

.share{
margin-top:14px;
background:#eef1ff;
padding:16px;
border-radius:18px;
text-align:center;
font-size:20px;
font-weight:800;
}

@media(max-width:480px){
.wrap{padding:14px;}
.stats{gap:8px;}
.card{padding:12px;}
.game{
height:72vw;
min-height:280px;
}
.black{
font-size:20px;
padding:16px;
}
.share{
font-size:18px;
}
}
</style>
</head>

<body>

<div class="wrap">

<select id="lang" onchange="setLang()">
<option value="cn">中文（简体）</option>
<option value="en">English</option>
<option value="hk">廣東話</option>
<option value="jp">日本語</option>
<option value="kr">한국어</option>
</select>

<h1 id="title">最近休息够吗？</h1>
<div class="sub" id="sub">测测你的反应速度</div>

<div class="banner b1" id="feed1">🔥 全球玩家正在挑战中</div>
<div class="banner b2" id="feed2">⚡ 你能进入前10%吗？</div>

<div class="stats">
<div class="card">
<div class="num" id="levelNum">1</div>
<div class="label" id="levelText">关卡</div>
</div>

<div class="card">
<div class="num" id="scoreNum">0</div>
<div class="label" id="scoreText">积分</div>
</div>

<div class="card">
<div class="num" id="rankNum">--</div>
<div class="label" id="rankText">全球排名</div>
</div>
</div>

<div class="game" id="game">
<button class="btn" id="mainBtn" onclick="startGame()">立即测试</button>
</div>

<div class="result" id="result">准备好了吗？</div>

<button class="black" id="restart" onclick="startGame()">开始挑战</button>

<div class="share" id="share">发给朋友挑战</div>

</div>

<script>
let lang="cn";
let level=1;
let score=0;
let startTime=0;
let moveTimer=null;

const text={
cn:{
title:"最近休息够吗？",
sub:"测测你的反应速度",
start:"立即测试",
ready:"准备好了吗？",
again:"开始挑战",
share:"发给朋友挑战",
level:"关卡",
score:"积分",
rank:"全球排名",
feed1:"🔥 全球玩家正在挑战中",
feed2:"⚡ 你能进入前10%吗？"
},
en:{
title:"Rested Enough Recently?",
sub:"Test your reaction speed",
start:"Start Now",
ready:"Ready?",
again:"Play Again",
share:"Challenge Friends",
level:"Level",
score:"Score",
rank:"Global Rank",
feed1:"🔥 Players worldwide are playing",
feed2:"⚡ Can you reach Top 10%?"
},
hk:{
title:"最近休息夠嗎？",
sub:"測試你嘅反應速度",
start:"立即開始",
ready:"準備好未？",
again:"開始挑戰",
share:"Send畀朋友挑戰",
level:"關卡",
score:"分數",
rank:"全球排名",
feed1:"🔥 全球玩家挑戰中",
feed2:"⚡ 你入到前10%嗎？"
},
jp:{
title:"最近ちゃんと休めた？",
sub:"反応速度をチェック",
start:"スタート",
ready:"準備OK？",
again:"もう一回",
share:"友達に送る",
level:"レベル",
score:"スコア",
rank:"世界順位",
feed1:"🔥 世界中で挑戦中",
feed2:"⚡ 上位10%に入れる？"
},
kr:{
title:"요즘 충분히 쉬었나요?",
sub:"반응속도를 테스트하세요",
start:"시작",
ready:"준비됐나요?",
again:"다시 시작",
share:"친구에게 공유",
level:"레벨",
score:"점수",
rank:"세계 순위",
feed1:"🔥 전 세계 플레이 중",
feed2:"⚡ 상위 10% 가능?"
}
};

function setLang(){
lang=document.getElementById("lang").value;
const t=text[lang];

title.innerText=t.title;
sub.innerText=t.sub;
mainBtn.innerText=t.start;
result.innerText=t.ready;
restart.innerText=t.again;
share.innerText=t.share;
levelText.innerText=t.level;
scoreText.innerText=t.score;
rankText.innerText=t.rank;
feed1.innerText=t.feed1;
feed2.innerText=t.feed2;
}

function updateUI(){
levelNum.innerText=level;
scoreNum.innerText=score;
}

function startGame(){
clearInterval(moveTimer);
level=1;
score=0;
rankNum.innerText="--";
updateUI();
result.innerText="...";
level1();
}

function level1(){
game.innerHTML='<button class="btn" id="waitBtn">...</button>';

let delay=Math.random()*2500+1000;

setTimeout(()=>{
let btn=document.getElementById("waitBtn");
if(!btn)return;

btn.className="btn green";
btn.innerText="CLICK!";
startTime=Date.now();

btn.onclick=()=>{
let rt=Date.now()-startTime;
score+=Math.max(50,350-rt);
level=2;
updateUI();
result.innerText="Level 1: "+rt+" ms";
level2();
};
},delay);
}

function level2(){
setTimeout(()=>{
game.innerHTML="";
let box=document.createElement("div");
box.className="moveBox";
game.appendChild(box);

const maxX=game.clientWidth-90;
const maxY=game.clientHeight-90;

moveTimer=setInterval(()=>{
box.style.left=Math.random()*maxX+"px";
box.style.top=Math.random()*maxY+"px";
},500);

box.onclick=()=>{
clearInterval(moveTimer);
score+=250;
level=3;
updateUI();
result.innerText="Level 2 Clear!";
level3();
};
},800);
}

function level3(){
setTimeout(()=>{
game.innerHTML="";
let dot=document.createElement("div");
dot.className="smallDot";
game.appendChild(dot);

const maxX=game.clientWidth-58;
const maxY=game.clientHeight-58;

dot.style.left=Math.random()*maxX+"px";
dot.style.top=Math.random()*maxY+"px";

startTime=Date.now();

dot.onclick=()=>{
let rt=Date.now()-startTime;
score+=Math.max(100,420-rt);
finishGame();
};
},700);
}

function finishGame(){
let rank=Math.max(1,Math.floor(100000/(score+10)));
let beat=Math.min(99,Math.floor(score/8));

rankNum.innerText="#"+rank;

game.innerHTML='<button class="btn blue" onclick="startGame()">再来一次</button>';

result.innerHTML="🏆 通关成功<br>积分："+score+"<br>击败全球 "+beat+"% 玩家";
}

setLang();
</script>

</body>
</html>
