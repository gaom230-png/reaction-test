<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最近休息够吗？测测你的反应速度</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Noto Sans KR","Hiragino Sans",sans-serif;
background:linear-gradient(135deg,#f8f9ff,#eef2ff);
padding:16px;
display:flex;
justify-content:center;
min-height:100vh;
}
.wrap{
width:100%;
max-width:430px;
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}
select{
width:100%;
padding:12px;
border-radius:14px;
border:1px solid #ddd;
font-size:16px;
font-weight:800;
margin-bottom:14px;
background:#fff;
}
.title{
font-size:30px;
font-weight:900;
line-height:1.25;
text-align:center;
margin-bottom:8px;
}
.sub{
font-size:14px;
color:#666;
text-align:center;
line-height:1.6;
margin-bottom:14px;
}
.live{
background:#fff7e6;
padding:10px;
border-radius:14px;
text-align:center;
font-size:13px;
font-weight:900;
margin-bottom:12px;
}
.feed{
background:#eef7ff;
padding:10px;
border-radius:14px;
text-align:center;
font-size:13px;
font-weight:800;
margin-bottom:14px;
min-height:40px;
}
.stats{
display:flex;
gap:10px;
margin-bottom:14px;
}
.box{
flex:1;
background:#f5f6ff;
padding:10px;
border-radius:14px;
text-align:center;
}
.num{font-size:22px;font-weight:900}
.lab{font-size:12px;color:#666;margin-top:4px}
#arena{
height:320px;
background:#f5f7ff;
border-radius:22px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}
.centerBtn{
background:#ff4d4f;
color:#fff;
border:none;
padding:18px 24px;
border-radius:18px;
font-size:24px;
font-weight:900;
cursor:pointer;
}
.target{
position:absolute;
width:72px;height:72px;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
font-weight:900;
color:#fff;
cursor:pointer;
background:#10b981;
}
.fake{background:#ff4d4f}
#msg{
margin-top:16px;
text-align:center;
font-size:24px;
font-weight:900;
}
#desc{
margin-top:8px;
text-align:center;
color:#666;
line-height:1.6;
min-height:48px;
}
.btns{
display:grid;
gap:10px;
margin-top:16px;
}
button.action{
border:none;
padding:14px;
border-radius:14px;
font-size:16px;
font-weight:900;
cursor:pointer;
}
.main{background:#111;color:#fff}
.sec{background:#eef1ff}
.tip{
margin-top:12px;
text-align:center;
font-size:12px;
color:#999;
}
</style>
</head>
<body>

<div class="wrap">

<select id="langSelect" onchange="changeLang()">
<option value="zh">中文（简体）</option>
<option value="yue">粵語</option>
<option value="en">English</option>
<option value="ko">한국어</option>
<option value="ja">日本語</option>
</select>

<div class="title" id="title">最近休息够吗？</div>
<div class="sub" id="sub">测测你的反应速度 · 全球玩家正在挑战中</div>

<div class="live" id="live">🔥 今日已有 28,431 人挑战</div>

<div class="feed" id="feed">🔥 上海用户刚通关第3关</div>

<div class="stats">
<div class="box">
<div class="num" id="lv">1</div>
<div class="lab" id="lab1">关卡</div>
</div>
<div class="box">
<div class="num" id="sc">0</div>
<div class="lab" id="lab2">积分</div>
</div>
<div class="box">
<div class="num" id="rk">--</div>
<div class="lab" id="lab3">全球排名</div>
</div>
</div>

<div id="arena">
<button class="centerBtn" onclick="startGame()" id="startBtn">立即测试</button>
</div>

<div id="msg">准备好了吗？</div>
<div id="desc">很多人卡在第二关 😏</div>

<div class="btns">
<button class="action main" onclick="startGame()" id="restartBtn">重新测试</button>
<button class="action sec" onclick="shareGame()" id="shareBtn">发给朋友测试</button>
</div>

<div class="tip" id="tip">反应速度可能受睡眠、压力、疲劳影响</div>

</div>

<script>
let lang="zh";
let level=1,score=0,timer=null,moveTimer=null;
let players=28431;

const T={
zh:{
title:"最近休息够吗？",
sub:"测测你的反应速度 · 全球玩家正在挑战中",
l1:"关卡",l2:"积分",l3:"全球排名",
start:"立即测试",restart:"重新测试",share:"发给朋友测试",
ready:"准备好了吗？",desc:"很多人卡在第二关 😏",
tip:"反应速度可能受睡眠、压力、疲劳影响",
live:"🔥 今日已有 ",live2:" 人挑战",
copy:"已复制分享文案"
},
yue:{
title:"最近休息夠嗎？",
sub:"測測你嘅反應速度 · 全球玩家挑戰中",
l1:"關卡",l2:"分數",l3:"全球排名",
start:"立即測試",restart:"重新測試",share:"發俾朋友測試",
ready:"準備好未？",desc:"好多人卡喺第二關 😏",
tip:"反應速度可能受睡眠、壓力、疲勞影響",
live:"🔥 今日已有 ",live2:" 人挑戰",
copy:"已複製分享內容"
},
en:{
title:"Have You Rested Enough Recently?",
sub:"Test Your Reaction Speed · Players Worldwide Competing",
l1:"Level",l2:"Score",l3:"Global Rank",
start:"Test Now",restart:"Retry Test",share:"Share Test",
ready:"Ready?",desc:"Most fail level 2 😏",
tip:"Reaction speed may be affected by sleep, stress, fatigue",
live:"🔥 Today ",live2:" players joined",
copy:"Copied!"
},
ko:{
title:"최근 충분히 쉬었나요?",
sub:"반응 속도를 테스트해보세요 · 전 세계 유저 참여 중",
l1:"레벨",l2:"점수",l3:"세계 랭킹",
start:"지금 테스트",restart:"다시 테스트",share:"친구에게 공유",
ready:"준비됐나요?",desc:"대부분 2단계 실패 😏",
tip:"반응 속도는 수면·스트레스·피로의 영향을 받을 수 있습니다",
live:"🔥 오늘 ",live2:"명 도전",
copy:"복사되었습니다!"
},
ja:{
title:"最近ちゃんと休めていますか？",
sub:"反応速度をテストしよう · 世界中で挑戦中",
l1:"レベル",l2:"スコア",l3:"世界順位",
start:"今すぐテスト",restart:"再テスト",share:"友達に共有",
ready:"準備OK？",desc:"多くの人はレベル2で失敗 😏",
tip:"反応速度は睡眠・ストレス・疲労の影響を受けます",
live:"🔥 本日 ",live2:" 人が挑戦",
copy:"コピーしました！"
}
};

function applyLang(){
let t=T[lang];
title.innerHTML=t.title;
sub.innerHTML=t.sub;
lab1.innerHTML=t.l1;
lab2.innerHTML=t.l2;
lab3.innerHTML=t.l3;
startBtn.innerHTML=t.start;
restartBtn.innerHTML=t.restart;
shareBtn.innerHTML=t.share;
msg.innerHTML=t.ready;
desc.innerHTML=t.desc;
tip.innerHTML=t.tip;
live.innerHTML=t.live+players.toLocaleString()+t.live2;
langSelect.value=lang;
}

function changeLang(){lang=langSelect.value;applyLang();geoFeed();}
function updateStats(){lv.innerHTML=level;sc.innerHTML=score;}

function geoFeed(){
const data={
zh:["上海用户刚通关第3关","深圳用户获得612分","海外用户挑战失败","北京用户进入全球前10%"],
yue:["香港用戶啱啱過第3關","廣州用戶攞到612分","海外用戶挑戰失敗","深圳用戶打入全球前10%"],
en:["Local player cleared Level 3","Overseas player scored 612","Player failed Level 2","Player entered Global Top 10%"],
ko:["현지 유저가 3단계 클리어","해외 유저가 612점 획득","플레이어가 2단계 실패","세계 상위 10% 진입"],
ja:["現地ユーザーがレベル3クリア","海外ユーザーが612点獲得","プレイヤーがレベル2失敗","世界上位10%入り"]
};
let arr=data[lang];
feed.innerHTML="🔥 "+arr[Math.floor(Math.random()*arr.length)];
}

function resetArena(){clearTimeout(timer);clearInterval(moveTimer);arena.innerHTML="";}

function startGame(){level=1;score=0;updateStats();run1();}

function run1(){
resetArena();
let b=document.createElement("button");
b.className="centerBtn";
b.innerHTML="...";
arena.appendChild(b);

timer=setTimeout(()=>{
b.style.background="#10b981";
b.innerHTML="TAP!";
let st=Date.now();
b.onclick=()=>{
score+=Math.max(50,500-(Date.now()-st));
level=2;updateStats();setTimeout(run2,300);
};
},1500+Math.random()*2000);
}

function run2(){
resetArena();
let t=document.createElement("div");
t.className="target";
t.innerHTML="GO";
arena.appendChild(t);

function mv(){
t.style.left=Math.random()*300+"px";
t.style.top=Math.random()*220+"px";
}
mv();
moveTimer=setInterval(mv,700);

t.onclick=()=>{
clearInterval(moveTimer);
score+=200;
level=3;updateStats();setTimeout(run3,300);
};
}

function run3(){
resetArena();
for(let i=0;i<3;i++){
let b=document.createElement("div");
b.className="target "+(i==1?"":"fake");
b.style.left=(30+i*110)+"px";
b.style.top="120px";
b.innerHTML="?";
arena.appendChild(b);
b.onclick=()=>{i==1?winGame():loseGame();}
}
}

function winGame(){
resetArena();
let beat=Math.floor(88+Math.random()*11);
let top=100-beat;

rk.innerHTML=(lang=="zh"||lang=="yue")?"前"+top+"%":
(lang=="ko")?"상위 "+top+"%":
(lang=="ja")?"上位"+top+"%":"Top "+top+"%";

msg.innerHTML="🏆";

if(lang=="zh"||lang=="yue"){
desc.innerHTML="你击败了全球"+beat+"%玩家";
}else{
desc.innerHTML="You beat "+beat+"% of players";
}

let b=document.createElement("button");
b.className="centerBtn";
b.style.background="#10b981";
b.innerHTML=startBtn.innerHTML;
b.onclick=startGame;
arena.appendChild(b);
}

function loseGame(){
resetArena();
msg.innerHTML="❌";
desc.innerHTML=(lang=="zh"||lang=="yue")?"再试一次":"Try again";

let b=document.createElement("button");
b.className="centerBtn";
b.innerHTML=restartBtn.innerHTML;
b.onclick=startGame;
arena.appendChild(b);
}

function shareGame(){
let txt=(lang=="zh"||lang=="yue")?
"最近休息够吗？我刚击败全球玩家，来测测你自己！ "+location.href:
"Have you rested enough recently? I just beat players worldwide. Test yourself! "+location.href;

if(navigator.share){
navigator.share({title:document.title,text:txt,url:location.href});
}else{
navigator.clipboard.writeText(txt);
alert(T[lang].copy);
}
}

setInterval(()=>{
players+=Math.floor(Math.random()*7)+1;
applyLang();
geoFeed();
},3000);

applyLang();
updateStats();
geoFeed();
</script>

</body>
</html>
