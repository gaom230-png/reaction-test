<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reaction Challenge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Arial,Helvetica,sans-serif;
background:linear-gradient(135deg,#eef1ff,#f6f7ff);
display:flex;
justify-content:center;
padding:12px;
}

.wrap{
width:100%;
max-width:520px;
background:#fff;
border-radius:28px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

select{
width:100%;
padding:14px;
font-size:18px;
border-radius:16px;
border:2px solid #ddd;
margin-bottom:18px;
}

h1{
text-align:center;
font-size:clamp(34px,8vw,60px);
margin-bottom:8px;
font-weight:900;
}

.sub{
text-align:center;
font-size:clamp(18px,4vw,28px);
color:#777;
margin-bottom:20px;
font-weight:700;
}

.banner{
padding:16px;
border-radius:18px;
text-align:center;
font-size:clamp(18px,4vw,28px);
font-weight:900;
margin-bottom:14px;
}

.b1{background:#f7edd4}
.b2{background:#dfe9f8}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:18px;
}

.card{
background:#f2f3fb;
padding:16px;
border-radius:20px;
text-align:center;
}

.num{
font-size:clamp(28px,7vw,54px);
font-weight:900;
}

.label{
margin-top:8px;
font-size:clamp(15px,3vw,26px);
color:#666;
font-weight:800;
}

.game{
height:min(62vw,420px);
min-height:320px;
background:#f3f4fb;
border-radius:26px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:18px;
}

.btn{
background:#ff4d57;
color:#fff;
border:none;
padding:22px 34px;
font-size:clamp(24px,6vw,46px);
font-weight:900;
border-radius:22px;
cursor:pointer;
}

.green{background:#16c47f}
.blue{background:#247cff}
.black{
background:#000;
color:#fff;
padding:18px;
border-radius:18px;
font-size:28px;
font-weight:900;
width:100%;
border:none;
margin-top:10px;
cursor:pointer;
}

.result{
text-align:center;
padding:8px;
font-size:clamp(20px,5vw,40px);
font-weight:900;
line-height:1.5;
}

.moveBox{
width:90px;
height:90px;
background:#247cff;
position:absolute;
border-radius:18px;
cursor:pointer;
}

.smallDot{
width:58px;
height:58px;
background:#16c47f;
border-radius:50%;
position:absolute;
cursor:pointer;
}

.share{
margin-top:14px;
background:#eef1ff;
padding:16px;
border-radius:18px;
text-align:center;
font-weight:800;
font-size:22px;
}

</style>
</head>
<body>
<div class="wrap">

<select id="lang" onchange="setLang()">
<option value="cn">中文（简体）</option>
<option value="en">English</option>
<option value="hk">廣東話</option>
<option value="jp">日本語</option>
<option value="kr">한국어</option>
</select>

<h1 id="title">最近休息够吗？</h1>
<div class="sub" id="sub">测测你的反应速度</div>

<div class="banner b1" id="feed1">🔥 全球玩家正在挑战中</div>
<div class="banner b2" id="feed2">⚡ 你能进入前10%吗？</div>

<div class="stats">
<div class="card"><div class="num" id="levelNum">1</div><div class="label" id="levelText">关卡</div></div>
<div class="card"><div class="num" id="scoreNum">0</div><div class="label" id="scoreText">积分</div></div>
<div class="card"><div class="num" id="rankNum">--</div><div class="label" id="rankText">全球排名</div></div>
</div>

<div class="game" id="game">
<button class="btn" onclick="startGame()" id="mainBtn">立即测试</button>
</div>

<div class="result" id="result">准备好了吗？</div>

<button class="black" onclick="startGame()" id="restart">开始挑战</button>

<div class="share" id="share">发给朋友挑战</div>

</div>

<script>
let lang="cn";
let level=1;
let score=0;
let startTime=0;
let timer;

const text={
cn:["最近休息够吗？","测测你的反应速度","立即测试","准备好了吗？","开始挑战","发给朋友挑战","关卡","积分","全球排名"],
en:["Rested Enough Recently?","Test your reaction speed","Start","Ready?","Play Again","Challenge Friends","Level","Score","Global Rank"],
hk:["最近休息夠嗎？","測試反應速度","立即開始","準備好未？","開始挑戰","Send畀朋友挑戰","關卡","分數","全球排名"],
jp:["最近ちゃんと休めた？","反応速度テスト","スタート","準備OK？","再挑戦","友達に送る","レベル","スコア","世界順位"],
kr:["요즘 충분히 쉬었나요?","반응속도 테스트","시작","준비됐나요?","다시 시작","친구에게 공유","레벨","점수","세계 순위"]
};

function setLang(){
lang=document.getElementById("lang").value;
const t=text[lang];
title.innerText=t[0];
sub.innerText=t[1];
mainBtn.innerText=t[2];
result.innerText=t[3];
restart.innerText=t[4];
share.innerText=t[5];
levelText.innerText=t[6];
scoreText.innerText=t[7];
rankText.innerText=t[8];
}

function startGame(){
level=1;
score=0;
updateUI();
level1();
}

function updateUI(){
levelNum.innerText=level;
scoreNum.innerText=score;
}

function level1(){
game.innerHTML='<button class="btn" id="waitBtn">...</button>';
let delay=Math.random()*2500+1000;
setTimeout(()=>{
let b=document.getElementById("waitBtn");
if(!b)return;
b.className="btn green";
b.innerText="CLICK!";
startTime=Date.now();
b.onclick=()=>{
let rt=Date.now()-startTime;
score+=Math.max(0,300-rt);
level=2;
updateUI();
result.innerText="Level1: "+rt+" ms";
level2();
};
},delay);
}

function level2(){
setTimeout(()=>{
game.innerHTML='';
let box=document.createElement("div");
box.className="moveBox";
game.appendChild(box);

let gx=game.clientWidth-90;
let gy=game.clientHeight-90;

timer=setInterval(()=>{
box.style.left=Math.random()*gx+"px";
box.style.top=Math.random()*gy+"px";
},500);

box.onclick=()=>{
clearInterval(timer);
score+=250;
level=3;
updateUI();
result.innerText="Level 2 Clear!";
level3();
};
},900);
}

function level3(){
setTimeout(()=>{
game.innerHTML='';
let dot=document.createElement("div");
dot.className="smallDot";
game.appendChild(dot);

let gx=game.clientWidth-58;
let gy=game.clientHeight-58;
dot.style.left=Math.random()*gx+"px";
dot.style.top=Math.random()*gy+"px";

startTime=Date.now();

dot.onclick=()=>{
let rt=Date.now()-startTime;
score+=Math.max(100,400-rt);
finish();
};
},800);
}

function finish(){
let rank=Math.max(1,Math.floor(100000/(score+10)));
let beat=Math.min(99,Math.floor(score/8));
rankNum.innerText="#"+rank;
game.innerHTML='<button class="btn blue" onclick="startGame()">再来一次</button>';
result.innerHTML="🏆 通关成功<br>积分："+score+"<br>击败全球 "+beat+"% 玩家";
}

setLang();
</script>
</body>
</html>
