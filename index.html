<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最近你有好好休息吗？</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
background:linear-gradient(180deg,#eef1fb,#f8f9ff);
color:#111;
}

.wrapper{
max-width:460px;
margin:auto;
padding:10px;
}

.card{
background:#fff;
border-radius:22px;
padding:14px;
box-shadow:0 10px 28px rgba(0,0,0,.06);
overflow:hidden;
}

.lang{
width:100%;
padding:10px 12px;
font-size:15px;
border:2px solid #e3e3e3;
border-radius:14px;
margin-bottom:12px;
}

.liveWrap{
background:#f8efd8;
border-radius:16px;
padding:10px 0;
overflow:hidden;
margin-bottom:12px;
}

.liveTrack{
white-space:nowrap;
display:inline-block;
font-size:14px;
font-weight:800;
padding-left:100%;
animation:marquee 16s linear infinite;
}

@keyframes marquee{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
}

h1{
font-size:28px;
text-align:center;
font-weight:900;
margin-bottom:4px;
line-height:1.2;
}

.sub{
text-align:center;
font-size:15px;
color:#777;
font-weight:700;
margin-bottom:12px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-bottom:12px;
}

.stat{
background:#f4f5fb;
border-radius:16px;
padding:10px 6px;
text-align:center;
}

.num{
font-size:28px;
font-weight:900;
}

.label{
font-size:12px;
color:#666;
margin-top:4px;
font-weight:700;
}

.gamebox{
height:230px;
background:#f3f4fa;
border-radius:18px;
position:relative;
overflow:hidden;
margin-bottom:12px;
display:flex;
justify-content:center;
align-items:center;
}

.target{
width:122px;
height:122px;
border-radius:18px;
background:#ff4d4d;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:900;
cursor:pointer;
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
user-select:none;
}

.green{background:#18c97a;}
.blue{background:#247cff;}
.purple{background:#7a4dff;}

.small{
width:84px;
height:84px;
font-size:18px;
border-radius:14px;
transform:none;
}

.slideRect{
width:82px;
height:62px;
border-radius:14px;
transform:none;
}

.result{
text-align:center;
min-height:58px;
margin-bottom:10px;
}

.result h2{
font-size:22px;
margin-bottom:4px;
}

.result p{
font-size:14px;
color:#666;
margin:2px 0;
}

.btn{
width:100%;
border:none;
border-radius:16px;
padding:13px;
font-size:18px;
font-weight:900;
margin-top:8px;
cursor:pointer;
}

.black{background:#000;color:#fff;}
.gray{background:#eef0f5;color:#111;}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">

<select class="lang">
<option>中文（简体）</option>
<option>English</option>
<option>廣東話</option>
<option>日本語</option>
<option>한국어</option>
</select>

<div class="liveWrap">
<div class="liveTrack" id="liveTrack">🔥 今日已有 28,642 人挑战中...</div>
</div>

<h1>最近你有好好休息吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="stats">
<div class="stat"><div class="num" id="level">1</div><div class="label">关卡</div></div>
<div class="stat"><div class="num" id="score">0</div><div class="label">积分</div></div>
<div class="stat"><div class="num" id="rank">--</div><div class="label">全球排名</div></div>
</div>

<div class="gamebox" id="gamebox">
<div class="target" id="target">开始</div>
</div>

<div class="result" id="result">
<h2>准备好了吗？</h2>
<p>完成4关看看你的实力</p>
</div>

<button class="btn black" onclick="restartGame()">开始挑战</button>
<button class="btn gray">发给朋友挑战</button>

</div>
</div>

<script>
let stage=0;
let score=0;
let ready=false;
let startTime=0;
let moveTimer=null;
let tapCount=0;
let slideTimer=null;

const target=document.getElementById("target");
const gamebox=document.getElementById("gamebox");
const levelEl=document.getElementById("level");
const scoreEl=document.getElementById("score");
const rankEl=document.getElementById("rank");
const resultEl=document.getElementById("result");

/* live count */
setInterval(()=>{
let n=28642+Math.floor(Math.random()*1500);
document.getElementById("liveTrack").innerHTML="🔥 今日已有 "+n.toLocaleString()+" 人挑战中...";
},3500);

function restartGame(){
clearInterval(moveTimer);
clearInterval(slideTimer);

stage=1;
score=0;
ready=false;
tapCount=0;

levelEl.innerText="1";
scoreEl.innerText="0";
rankEl.innerText="--";

resultEl.innerHTML="<h2>准备好了吗？</h2><p>等待变绿后立即点击</p>";

target.className="target";
target.innerText="等待...";
target.style.width="122px";
target.style.height="122px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

setTimeout(()=>{
ready=true;
target.className="target green";
target.innerText="点击!";
startTime=Date.now();
},900+Math.random()*1500);
}

target.onclick=function(){

if(stage===1 && ready){
let rt=Date.now()-startTime;
score=Math.max(100,420-rt);
scoreEl.innerText=score;
levelEl.innerText="2";
resultEl.innerHTML="<h2>第一关完成</h2><p>"+rt+" ms</p>";
stage=2;
setTimeout(level2,400);
return;
}

if(stage===2){
clearInterval(moveTimer);
score+=180;
scoreEl.innerText=score;
levelEl.innerText="3";
resultEl.innerHTML="<h2>第二关完成</h2><p>继续冲刺！</p>";
stage=3;
setTimeout(level3,300);
return;
}

if(stage===3){
tapCount++;
target.innerText="连点"+(5-tapCount)+"次";
if(tapCount>=5){
score+=220;
scoreEl.innerText=score;
levelEl.innerText="4";
resultEl.innerHTML="<h2>第三关完成</h2><p>终极挑战来了！</p>";
stage=4;
setTimeout(level4,400);
}
return;
}

if(stage===4){
finishGame();
return;
}

if(stage===5){
restartGame();
}
};

/* stage2 */
function level2(){
target.className="target small blue";
target.innerText="抓我";

moveTimer=setInterval(()=>{
let maxX=gamebox.clientWidth-84;
let maxY=gamebox.clientHeight-84;
target.style.left=Math.random()*maxX+"px";
target.style.top=Math.random()*maxY+"px";
target.style.transform="none";
},420);
}

/* stage3 */
function level3(){
tapCount=0;
target.className="target green";
target.style.width="118px";
target.style.height="118px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
target.innerText="连点5次";
}

/* NEW stage4 */
function level4(){

target.className="target purple slideRect";
target.innerText="点我";

let boxW=82;
let boxH=62;
let maxX=gamebox.clientWidth-boxW;
let maxY=gamebox.clientHeight-boxH;

let paths=[
{sx:0,sy:0,ex:maxX,ey:0},             // 左上->右上
{sx:0,sy:0,ex:0,ey:maxY},            // 左上->左下
{sx:0,sy:0,ex:maxX,ey:maxY},         // 左上->右下
{sx:maxX,sy:0,ex:0,ey:maxY},         // 右上->左下
{sx:0,sy:maxY,ex:maxX,ey:0},         // 左下->右上
{sx:maxX,sy:maxY,ex:0,ey:0}          // 右下->左上
];

let p=paths[Math.floor(Math.random()*paths.length)];
let step=0;
let total=22;

clearInterval(slideTimer);

slideTimer=setInterval(()=>{
step++;
let t=step/total;

let x=p.sx+(p.ex-p.sx)*t;
let y=p.sy+(p.ey-p.sy)*t;

target.style.left=x+"px";
target.style.top=y+"px";
target.style.transform="none";

if(step>=total){
clearInterval(slideTimer);
level4(); /* repeat if missed */
}
},28);
}

/* finish */
function finishGame(){
clearInterval(slideTimer);
stage=5;

score+=320;
scoreEl.innerText=score;

let rank="前50%";
if(score>950) rank="前1%";
else if(score>820) rank="前5%";
else if(score>700) rank="前10%";
else if(score>580) rank="前25%";

rankEl.innerText=rank;

resultEl.innerHTML=
"<h2>🏆 挑战成功</h2><p>总分："+score+
"</p><p>你已进入全球"+rank+"</p>";

target.className="target";
target.style.width="122px";
target.style.height="122px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
target.innerText="再来一次";
}
</script>

</body>
</html>
