<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最近你有好好休息吗？</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#eef0f7;
  color:#111;
}
.wrap{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:14px;
}
.card{
  background:#fff;
  border-radius:26px;
  padding:18px;
  box-shadow:0 12px 28px rgba(0,0,0,.06);
}
select{
  width:100%;
  padding:12px 14px;
  border-radius:16px;
  border:2px solid #ececec;
  font-size:16px;
  background:#fff;
  margin-bottom:14px;
}
.notice{
  background:#efe6cf;
  border-radius:18px;
  padding:14px;
  text-align:center;
  font-size:18px;
  font-weight:800;
  margin-bottom:14px;
}
h1{
  text-align:center;
  font-size:28px;
  line-height:1.25;
  margin:10px 0 6px;
}
.sub{
  text-align:center;
  color:#777;
  font-size:16px;
  margin-bottom:14px;
}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.box{
  background:#f3f4fb;
  border-radius:18px;
  padding:14px 8px;
  text-align:center;
}
.big{
  font-size:32px;
  font-weight:900;
}
.small{
  font-size:15px;
  color:#666;
  margin-top:6px;
}
.arena{
  position:relative;
  height:320px;
  border-radius:24px;
  background:#f4f5fa;
  overflow:hidden;
  margin-bottom:16px;
}
.target{
  position:absolute;
  width:132px;
  height:132px;
  border-radius:24px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  background:#ff5757;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:22px;
  font-weight:900;
  user-select:none;
  transition:.18s;
}
.green{background:#16c37d;}
.blue{background:#3b82f6;}
.orange{background:#ff9f1a;}
.btn{
  width:100%;
  border:none;
  border-radius:18px;
  background:#111;
  color:#fff;
  padding:16px;
  font-size:22px;
  font-weight:900;
  cursor:pointer;
}
.btn:active{
  transform:scale(.98);
}
.result{
  margin-top:16px;
  text-align:center;
  line-height:1.8;
}
.result h2{
  font-size:28px;
}
.rank{
  font-size:18px;
  font-weight:800;
  color:#333;
}
@media(max-width:420px){
  h1{font-size:25px;}
  .arena{height:290px;}
  .target{
    width:118px;
    height:118px;
    font-size:20px;
  }
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<select>
<option>中文（简体）</option>
</select>

<div class="notice" id="notice">🔥 今日已有 29,800 人挑战中...</div>

<h1>最近你有好好休息吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="stats">
  <div class="box">
    <div class="big" id="levelNum">1</div>
    <div class="small">关卡</div>
  </div>

  <div class="box">
    <div class="big" id="scoreNum">0</div>
    <div class="small">积分</div>
  </div>

  <div class="box">
    <div class="big" id="rankNum">--</div>
    <div class="small">全球排名</div>
  </div>
</div>

<div class="arena" id="arena">
  <div class="target" id="target">准备中</div>
</div>

<button class="btn" onclick="startGame()">开始挑战</button>

<div class="result" id="result"></div>

</div>
</div>

<script>
let people = 29800;
setInterval(()=>{
  people += Math.floor(Math.random()*6)+1;
  notice.innerText = "🔥 今日已有 " + people.toLocaleString() + " 人挑战中...";
},2500);

let level = 1;
let score = 0;
let timer = null;
let startTime = 0;

const target = document.getElementById("target");
const arena = document.getElementById("arena");

function updateUI(){
  levelNum.innerText = level;
  scoreNum.innerText = score;
}

function resetBox(){
  clearInterval(timer);
  target.className = "target";
  target.style.left = "50%";
  target.style.top = "50%";
  target.style.transform = "translate(-50%,-50%)";
  target.onclick = null;
}

function startGame(){
  level = 1;
  score = 0;
  rankNum.innerText = "--";
  result.innerHTML = "";
  updateUI();
  runLevel();
}

function runLevel(){
  resetBox();

  if(level===1){
    target.innerText = "等待变绿...";
    setTimeout(()=>{
      target.classList.add("green");
      target.innerText = "点击!";
      startTime = Date.now();

      target.onclick = ()=>{
        let ms = Date.now()-startTime;
        score += Math.max(320-ms,60);
        level = 2;
        updateUI();
        runLevel();
      };
    },1000+Math.random()*1400);
  }

  else if(level===2){
    target.classList.add("blue");
    target.innerText = "追我!";

    moveRandom();
    timer = setInterval(moveRandom,650);

    target.onclick = ()=>{
      score += 180;
      level = 3;
      updateUI();
      runLevel();
    };
  }

  else if(level===3){
    target.classList.add("orange");
    let hit = 3;
    target.innerText = "连点3次";

    target.onclick = ()=>{
      hit--;
      if(hit>0){
        target.innerText = "再点"+hit+"次";
      }else{
        score += 260;
        level = 4;
        updateUI();
        runLevel();
      }
    };
  }

  else if(level===4){
    target.classList.add("green");
    target.innerText = "抓住我!";
    slideMove();

    target.onclick = ()=>{
      score += 350;
      finishGame();
    };
  }
}

function moveRandom(){
  let maxX = arena.clientWidth - target.offsetWidth;
  let maxY = arena.clientHeight - target.offsetHeight;

  target.style.transform = "none";
  target.style.left = Math.random()*maxX + "px";
  target.style.top = Math.random()*maxY + "px";
}

function slideMove(){
  const p = [
    [0,0],
    [0,180],
    [260,0],
    [260,180]
  ];

  let a = p[Math.floor(Math.random()*p.length)];
  let b = p[Math.floor(Math.random()*p.length)];
  while(a===b){
    b = p[Math.floor(Math.random()*p.length)];
  }

  let step = 0;
  target.style.transform = "none";

  timer = setInterval(()=>{
    step++;

    let x = a[0] + (b[0]-a[0])*step/24;
    let y = a[1] + (b[1]-a[1])*step/24;

    target.style.left = x+"px";
    target.style.top = y+"px";

    if(step>=24){
      clearInterval(timer);
      slideMove();
    }
  },32);
}

function finishGame(){
  clearInterval(timer);

  let beat = Math.min(99.9,(70+score/18)).toFixed(1);
  let rank = Math.max(1,Math.floor(people*(100-beat)/100));

  rankNum.innerText = "#" + rank.toLocaleString();

  result.innerHTML = `
    <h2>🏆 挑战成功</h2>
    <div class="rank">全球排名 #${rank.toLocaleString()}</div>
    <div class="rank">超过全球 ${beat}% 玩家</div>
  `;

  target.className = "target green";
  target.style.left = "50%";
  target.style.top = "50%";
  target.style.transform = "translate(-50%,-50%)";
  target.innerText = "再来一次";
  target.onclick = startGame;
}
</script>

</body>
</html>
