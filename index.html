<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>最近你有好好休息吗？</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#eef0f6;
display:flex;
justify-content:center;
padding:14px;
color:#111;
}
.wrap{
width:100%;
max-width:520px;
background:#fff;
border-radius:24px;
padding:16px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}
select{
width:100%;
padding:14px;
border-radius:16px;
border:2px solid #ddd;
font-size:18px;
margin-bottom:14px;
}
.banner{
background:#efe6cf;
padding:14px;
text-align:center;
border-radius:18px;
font-weight:800;
font-size:18px;
margin-bottom:16px;
}
h1{
font-size:34px;
text-align:center;
margin-bottom:8px;
line-height:1.2;
}
.sub{
text-align:center;
color:#777;
font-size:18px;
margin-bottom:18px;
}
.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-bottom:14px;
}
.card{
background:#f3f4fa;
border-radius:18px;
padding:14px 8px;
text-align:center;
}
.big{
font-size:42px;
font-weight:900;
}
.label{
font-size:15px;
color:#666;
margin-top:6px;
}
#arena{
position:relative;
height:360px;
background:#f3f4fa;
border-radius:24px;
overflow:hidden;
margin-bottom:16px;
}
#target{
position:absolute;
width:140px;
height:140px;
border-radius:24px;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#ff5252;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:22px;
font-weight:900;
cursor:pointer;
user-select:none;
transition:.15s;
text-align:center;
padding:10px;
}
.green{background:#25c27a!important}
.blue{background:#4d8cff!important}
.orange{background:#ff9f43!important}
button{
width:100%;
border:none;
background:#000;
color:#fff;
padding:18px;
border-radius:18px;
font-size:28px;
font-weight:900;
cursor:pointer;
}
#result{
text-align:center;
margin-top:18px;
line-height:1.8;
}
.small{font-size:16px;color:#666}
</style>
</head>
<body>
<div class="wrap">

<select id="lang">
<option value="zh">中文（简体）</option>
<option value="en">English</option>
<option value="hk">廣東話</option>
<option value="jp">日本語</option>
<option value="kr">한국어</option>
</select>

<div class="banner" id="banner">🔥 今日已有 29,580 人挑战中...</div>

<h1 id="title">最近你有好好休息吗？</h1>
<div class="sub" id="sub">测测你的反应速度</div>

<div class="stats">
<div class="card">
<div class="big" id="stageNum">1</div>
<div class="label" id="lab1">关卡</div>
</div>
<div class="card">
<div class="big" id="scoreNum">0</div>
<div class="label" id="lab2">积分</div>
</div>
<div class="card">
<div class="big" id="rankNum">--</div>
<div class="label" id="lab3">全球排名</div>
</div>
</div>

<div id="arena">
<div id="target">开始</div>
</div>

<button onclick="startGame()" id="startBtn">开始挑战</button>

<div id="result"></div>

</div>

<script>
let lang="zh";
let level=1;
let score=0;
let people=29580;
let stageTimes=[0,0,0,0];
let startTime=0;
let timer=null;

const target=document.getElementById("target");
const stageNum=document.getElementById("stageNum");
const scoreNum=document.getElementById("scoreNum");
const rankNum=document.getElementById("rankNum");
const result=document.getElementById("result");

const words={
zh:{title:"最近你有好好休息吗？",sub:"测测你的反应速度",start:"开始挑战",stage:"关卡",score:"积分",rank:"全球排名",wait:"等待变绿",click:"点击!",ready:"准备开始",success:"挑战成功"},
en:{title:"Have You Rested Well Recently?",sub:"Test your reaction speed",start:"Start",stage:"Stage",score:"Score",rank:"Global Rank",wait:"Wait Green",click:"Click!",ready:"Ready",success:"Success"},
hk:{title:"最近你有冇好好休息？",sub:"測試反應速度",start:"開始挑戰",stage:"關卡",score:"分數",rank:"全球排名",wait:"等變綠",click:"撳佢!",ready:"準備開始",success:"成功"},
jp:{title:"最近ちゃんと休めてる？",sub:"反応速度テスト",start:"開始",stage:"ステージ",score:"スコア",rank:"世界順位",wait:"緑まで待つ",click:"クリック!",ready:"準備",success:"成功"},
kr:{title:"최근 잘 쉬고 있나요?",sub:"반응속도 테스트",start:"시작",stage:"단계",score:"점수",rank:"세계 순위",wait:"초록색 대기",click:"클릭!",ready:"준비",success:"성공"}
};

function t(k){return words[lang][k]}

document.getElementById("lang").onchange=e=>{
lang=e.target.value;
refreshText();
};

function refreshText(){
document.getElementById("title").innerText=t("title");
document.getElementById("sub").innerText=t("sub");
document.getElementById("startBtn").innerText=t("start");
document.getElementById("lab1").innerText=t("stage");
document.getElementById("lab2").innerText=t("score");
document.getElementById("lab3").innerText=t("rank");
}
refreshText();

setInterval(()=>{
people+=Math.floor(Math.random()*3);
document.getElementById("banner").innerText=`🔥 今日已有 ${people.toLocaleString()} 人挑战中...`;
},3000);

function updateUI(){
stageNum.innerText=level;
scoreNum.innerText=score;
}

function resetTarget(){
target.style.display="flex";
target.style.width="140px";
target.style.height="140px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";
target.className="";
target.onclick=null;
target.innerHTML="";
}

function startGame(){
clearInterval(timer);
level=1;
score=0;
stageTimes=[0,0,0,0];
rankNum.innerText="--";
result.innerHTML="";
updateUI();
intro();
}

function intro(){
resetTarget();
target.innerHTML=`<div><div style="font-size:28px">${t("stage")} ${level}</div><div style="font-size:16px;margin-top:8px">${t("ready")}</div></div>`;
setTimeout(runStage,900);
}

function stageResult(ms,next){
target.className="green";
target.innerHTML=`<div><div style="font-size:30px">${ms} ms</div><div style="font-size:14px;margin-top:6px">OK</div></div>`;
setTimeout(next,800);
}

function runStage(){

/* Stage 1 */
if(level===1){
resetTarget();
target.innerText=t("wait");
setTimeout(()=>{
target.className="green";
target.innerText=t("click");
startTime=Date.now();
target.onclick=()=>{
let rt=Date.now()-startTime;
stageTimes[0]=rt;
score+=Math.max(300-rt,60);
updateUI();
stageResult(rt,()=>{level=2;updateUI();intro();});
};
},1000+Math.random()*1200);
}

/* Stage 2 */
else if(level===2){
resetTarget();
target.style.display="none";
setTimeout(()=>{
target.style.display="flex";
target.className="blue";
target.innerText=t("click");
target.style.left="-70px";
target.style.top="50%";
startTime=Date.now();
let x=-70;
timer=setInterval(()=>{
x+=10;
target.style.left=x+"px";
if(x>520){clearInterval(timer);}
},16);
target.onclick=()=>{
clearInterval(timer);
let rt=Date.now()-startTime;
stageTimes[1]=rt;
score+=220;
updateUI();
stageResult(rt,()=>{level=3;updateUI();intro();});
};
},500);
}

/* Stage 3 */
else if(level===3){
resetTarget();
target.className="orange";
let hit=3;
let st=Date.now();
target.innerText="3x";
target.onclick=()=>{
hit--;
if(hit>0){
target.innerText=hit+"x";
}else{
let rt=Date.now()-st;
stageTimes[2]=rt;
score+=260;
updateUI();
stageResult(rt,()=>{level=4;updateUI();intro();});
}
};
}

/* Stage 4 */
else if(level===4){
resetTarget();
target.style.display="none";
setTimeout(()=>{
target.style.display="flex";
target.className="green";
target.innerText=t("click");
target.style.left="0px";
target.style.top="0px";
startTime=Date.now();
let x=0,y=0;
timer=setInterval(()=>{
x+=8;y+=6;
target.style.left=x+"px";
target.style.top=y+"px";
if(x>360||y>250) clearInterval(timer);
},16);
target.onclick=()=>{
clearInterval(timer);
let rt=Date.now()-startTime;
stageTimes[3]=rt;
score+=350;
updateUI();
finishGame();
};
},500);
}
}

function finishGame(){
let beat=Math.min(99.9,(70+score/18)).toFixed(1);
let rank=Math.max(1,Math.floor(people*(100-beat)/100));

rankNum.innerText="#"+rank.toLocaleString();

target.className="green";
target.style.width="220px";
target.style.height="220px";
target.style.left="50%";
target.style.top="50%";
target.style.transform="translate(-50%,-50%)";

target.innerHTML=`
<div style="line-height:1.6">
<div style="font-size:26px">🏆</div>
<div style="font-size:24px;font-weight:900">${t("success")}</div>
<div style="font-size:14px">S1: ${stageTimes[0]} ms</div>
<div style="font-size:14px">S2: ${stageTimes[1]} ms</div>
<div style="font-size:14px">S3: ${stageTimes[2]} ms</div>
<div style="font-size:14px">S4: ${stageTimes[3]} ms</div>
</div>
`;

result.innerHTML=`
<div style="font-size:32px;font-weight:900">全球排名 #${rank.toLocaleString()}</div>
<div style="font-size:28px;font-weight:900">超过全球 ${beat}% 玩家</div>
`;

target.onclick=startGame;
}

</script>
</body>
</html>
