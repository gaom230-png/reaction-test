<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>最近休息够吗？测试你的反应速度</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
}

body{
background:linear-gradient(135deg,#eef1f8,#dde4f2);
padding:16px;
display:flex;
justify-content:center;
}

.wrap{
width:100%;
max-width:760px;
background:#fff;
border-radius:28px;
padding:22px;
box-shadow:0 20px 50px rgba(0,0,0,.08);
}

select{
width:100%;
padding:14px 18px;
font-size:clamp(16px,2vw,22px);
font-weight:700;
border:2px solid #eee;
border-radius:18px;
margin-bottom:22px;
background:#fff;
}

h1{
font-size:clamp(34px,6vw,56px);
line-height:1.15;
text-align:center;
font-weight:900;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:clamp(18px,3vw,28px);
color:#777;
font-weight:700;
margin-bottom:20px;
}

.liveBox,.feedBox{
padding:16px 18px;
border-radius:20px;
text-align:center;
font-weight:800;
font-size:clamp(16px,3vw,30px);
margin-bottom:14px;
}

.liveBox{background:#f5ecd7;}
.feedBox{background:#dfe9f6;}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
margin:18px 0;
}

.card{
background:#f1f2fa;
border-radius:22px;
padding:18px 12px;
text-align:center;
}

.big{
font-size:clamp(28px,5vw,54px);
font-weight:900;
}

.small{
margin-top:8px;
font-size:clamp(14px,2.4vw,24px);
color:#666;
font-weight:700;
}

.game{
margin-top:8px;
height:min(60vw,500px);
min-height:320px;
max-height:500px;
background:#eef0f6;
border-radius:28px;
position:relative;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

.btn{
background:#ff4d54;
color:#fff;
border:none;
border-radius:22px;
padding:18px 34px;
font-size:clamp(22px,4vw,42px);
font-weight:900;
cursor:pointer;
}

.btnBlack{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:22px;
background:#000;
color:#fff;
font-size:clamp(20px,4vw,36px);
font-weight:900;
cursor:pointer;
}

.msg{
margin-top:18px;
text-align:center;
line-height:1.6;
font-size:clamp(18px,3vw,30px);
font-weight:800;
}

.rank{
color:#ff5b4c;
font-size:clamp(22px,3.5vw,38px);
font-weight:900;
}

.share{
margin-top:16px;
background:#eceef8;
padding:18px;
border-radius:20px;
text-align:center;
font-size:clamp(16px,2.8vw,28px);
font-weight:800;
}

.target{
position:absolute;
width:90px;
height:90px;
border-radius:18px;
background:#18c37d;
display:none;
cursor:pointer;
}

@media(max-width:560px){

.wrap{
padding:16px;
border-radius:20px;
}

.stats{
gap:10px;
}

.card{
padding:14px 8px;
border-radius:16px;
}

.game{
height:360px;
min-height:360px;
border-radius:22px;
}

.target{
width:74px;
height:74px;
}

.btn{
padding:16px 26px;
border-radius:18px;
}

.btnBlack{
border-radius:18px;
}
}

@media(min-width:1100px){

.wrap{
max-width:820px;
padding:28px;
}

.game{
height:520px;
}
}
</style>
</head>

<body>
<div class="wrap">

<select>
<option>中文（简体）</option>
<option>English</option>
<option>廣東話</option>
<option>日本語</option>
<option>한국어</option>
</select>

<h1>最近休息够吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="liveBox">🔥 全球玩家正在挑战中</div>
<div class="feedBox">⚡ 你能进入前10%吗？</div>

<div class="stats">
<div class="card">
<div class="big">1</div>
<div class="small">关卡</div>
</div>

<div class="card">
<div class="big">0</div>
<div class="small">积分</div>
</div>

<div class="card">
<div class="big">--</div>
<div class="small">全球排名</div>
</div>
</div>

<div class="game">
<button class="btn">立即测试</button>
<div class="target"></div>
</div>

<div class="msg">
准备好了吗？
</div>

<button class="btnBlack">重新开始</button>

<div class="share">发给朋友挑战</div>

</div>
</body>
</html>
