<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Reaction Speed Test</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background-color: #f5f5f5;
    }
    #box {
      width: 300px;
      height: 300px;
      margin: 50px auto;
      background-color: red;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>Reaction Speed Test</h1>
<div id="box">Click to Start</div>
<h2 id="result"></h2>

<script>
let startTime;
let timeout;
let ready = false;

const box = document.getElementById("box");
const result = document.getElementById("result");

box.onclick = () => {
  if (!ready) {
    result.textContent = "Wait for green...";
    box.style.backgroundColor = "red";

    timeout = setTimeout(() => {
      box.style.backgroundColor = "green";
      startTime = new Date().getTime();
      ready = true;
    }, Math.random() * 3000 + 2000);
  } else {
    const reactionTime = new Date().getTime() - startTime;
    result.textContent = `Your reaction time: ${reactionTime} ms`;

    ready = false;
    box.style.backgroundColor = "red";
  }
};
</script>

</body>
</html>
