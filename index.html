<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>最近你有好好休息吗？</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#eef0f7;
  color:#111;
}

.wrapper{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:14px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

select{
  width:100%;
  padding:12px 14px;
  border:2px solid #ececec;
  border-radius:16px;
  font-size:16px;
  margin-bottom:14px;
  background:#fff;
}

/* top counter */
.notice{
  background:#efe6cf;
  border-radius:18px;
  padding:14px 16px;
  text-align:center;
  font-size:18px;
  font-weight:700;
  margin-bottom:14px;
}

/* title */
h1{
  text-align:center;
  font-size:30px;
  line-height:1.25;
  margin:10px 0 6px;
}

.sub{
  text-align:center;
  color:#777;
  font-size:16px;
  margin-bottom:14px;
}

/* stats */
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}

.box{
  background:#f3f4fb;
  border-radius:18px;
  padding:14px 8px;
  text-align:center;
}

.big{
  font-size:34px;
  font-weight:800;
  line-height:1;
}

.small{
  margin-top:8px;
  font-size:15px;
  color:#666;
}

/* game arena */
.arena{
  position:relative;
  height:320px;
  border-radius:24px;
  background:#f4f5fa;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:16px;
}

.target{
  position:absolute;
  width:145px;
  height:145px;
  border-radius:22px;
  background:#ff5353;
  color:#fff;
  font-size:24px;
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:10px;
  cursor:pointer;
  user-select:none;
}

.green{ background:#17c37d; }
.blue{ background:#3d7cff; }
.orange{ background:#ff9d18; }

.btn{
  width:100%;
  border:none;
  background:#111;
  color:#fff;
  padding:16px;
  font-size:22px;
  font-weight:800;
  border-radius:18px;
  cursor:pointer;
}

.result{
  margin-top:16px;
  text-align:center;
  line-height:1.7;
}

.result h2{
  font-size:30px;
}

.rank{
  color:#666;
  font-size:16px;
}

@media(max-width:420px){
  h1{font-size:26px;}
  .arena{height:290px;}
  .target{
    width:125px;
    height:125px;
    font-size:21px;
  }
}
</style>
</head>

<body>
<div class="wrapper">
<div class="card">

<select>
<option>中文（简体）</option>
</select>

<div class="notice" id="notice">🔥 今日已有 29,711 人挑战中...</div>

<h1>最近你有好好休息吗？</h1>
<div class="sub">测测你的反应速度</div>

<div class="stats">
  <div class="box">
    <div class="big" id="levelNum">1</div>
    <div class="small">关卡</div>
  </div>

  <div class="box">
    <div class="big" id="scoreNum">0</div>
    <div class="small">积分</div>
  </div>

  <div class="box">
    <div class="big" id="rankNum">--</div>
    <div class="small">全球排名</div>
  </div>
</div>

<div class="arena" id="arena">
  <div class="target" id="target">立即测试</div>
</div>

<button class="btn" onclick="startGame()">开始挑战</button>

<div class="result" id="result"></div>

</div>
</div>

<script>
/* top challenger counter */
let people = 29711;

setInterval(() => {
  people += Math.floor(Math.random() * 8) + 1;

  document.getElementById("notice").innerText =
    "🔥 今日已有 " + people.toLocaleString() + " 人挑战中...";
}, 2500);

/* game */
let level = 1;
let score = 0;
let timer = null;
let moveTimer = null;
let startTime = 0;

const target = document.getElementById("target");
const arena = document.getElementById("arena");

function updateUI(){
  levelNum.innerText = level;
  scoreNum.innerText = score;
}

function resetTarget(){
  clearInterval(moveTimer);
  target.className = "target";
  target.style.left = "";
  target.style.top = "";
  target.onclick = null;
}

function startGame(){
  level = 1;
  score = 0;
  rankNum.innerText = "--";
  result.innerHTML = "";
  updateUI();
  runLevel();
}

function runLevel(){
  resetTarget();

  /* Stage 1 */
  if(level === 1){
    target.innerText = "准备中...";
    setTimeout(()=>{
      target.classList.add("green");
      target.innerText = "点击!";
      startTime = Date.now();

      target.onclick = () => {
        let ms = Date.now() - startTime;
        score += Math.max(320 - ms, 50);
        level = 2;
        updateUI();
        runLevel();
      };
    }, 1200 + Math.random()*1500);
  }

  /* Stage 2 moving */
  else if(level === 2){
    target.classList.add("blue");
    target.innerText = "追我!";

    moveRandom();
    moveTimer = setInterval(moveRandom, 700);

    target.onclick = () => {
      score += 180;
      level = 3;
      updateUI();
      runLevel();
    };
  }

  /* Stage 3 triple tap */
  else if(level === 3){
    target.classList.add("orange");
    let hit = 3;
    target.innerText = "连击3次";

    target.onclick = () => {
      hit--;
      if(hit > 0){
        target.innerText = "再点" + hit + "次";
      }else{
        score += 260;
        level = 4;
        updateUI();
        runLevel();
      }
    };
  }

  /* Stage 4 diagonal slide */
  else if(level === 4){
    target.classList.add("green");
    target.innerText = "抓住我!";
    slideTarget();

    target.onclick = () => {
      score += 350;
      finishGame();
    };
  }
}

function moveRandom(){
  let maxX = arena.clientWidth - target.offsetWidth;
  let maxY = arena.clientHeight - target.offsetHeight;

  target.style.left = Math.random()*maxX + "px";
  target.style.top = Math.random()*maxY + "px";
}

function slideTarget(){
  const points = [
    [0,0],
    [0,170],
    [260,0],
    [260,170]
  ];

  let a = points[Math.floor(Math.random()*points.length)];
  let b = points[Math.floor(Math.random()*points.length)];

  while(a === b){
    b = points[Math.floor(Math.random()*points.length)];
  }

  let step = 0;

  moveTimer = setInterval(()=>{
    step++;

    let x = a[0] + (b[0]-a[0]) * step/22;
    let y = a[1] + (b[1]-a[1]) * step/22;

    target.style.left = x + "px";
    target.style.top = y + "px";

    if(step >= 22){
      clearInterval(moveTimer);
      slideTarget();
    }
  },35);
}

function finishGame(){
  clearInterval(moveTimer);

  let rank = Math.max(1, Math.floor(50000 - score*20));
  let beat = Math.min(99.9, (70 + score/18)).toFixed(1);

  rankNum.innerText = "#" + rank;

  result.innerHTML = `
    <h2>🏆 挑战成功</h2>
    <div>最终积分：${score}</div>
    <div class="rank">超过全球 ${beat}% 玩家</div>
  `;

  target.innerText = "再来一次";
  target.onclick = startGame;
}
</script>

</body>
</html>
